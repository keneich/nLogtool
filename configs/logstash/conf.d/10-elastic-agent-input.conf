# logstash01 기준 템플릿 (logstash02는 인증서 파일명만 logstash02.crt / logstash02.pkcs8.key로 치환)
# 내부 LB(10.9.88.40:5044), 외부 LB(139.150.86.188:5044) 모두 이 포트로 패스스루된다.
input {
  elastic_agent {
    port => 5044
    ssl_enabled => true
    ssl_certificate => "/etc/logstash/certs/logstash01.crt"
    ssl_key => "/etc/logstash/certs/logstash01.pkcs8.key"
  }
}
